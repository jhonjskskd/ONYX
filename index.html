<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONYX | Private Membership Invitation</title>
    
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --onyx-gold: #c5a059;
            --onyx-dark: #030303;
            --text-secondary: rgba(255, 255, 255, 0.5);
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Premium Intro Animation */
        .app-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
            animation: onyxReveal 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        @keyframes onyxReveal {
            from { opacity: 0; transform: scale(0.98) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            letter-spacing: 12px;
            margin: 0;
            background: linear-gradient(to bottom, #fff, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.7rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--onyx-gold);
            margin-top: 10px;
            opacity: 0.8;
        }

        /* Luxury Input Styling */
        #form-container { margin-top: 60px; }

        .input-group {
            position: relative;
            margin-bottom: 35px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: border-color 0.4s;
        }

        .input-group:focus-within { border-color: var(--onyx-gold); }

        .input-group label {
            display: block;
            text-align: left;
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--onyx-gold);
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            padding: 10px 0;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            outline: none;
        }

        select option { background: #111; color: #fff; }

        .btn-onyx {
            background: transparent;
            border: 1px solid var(--onyx-gold);
            color: var(--onyx-gold);
            padding: 18px 40px;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.4s;
            margin-top: 20px;
        }

        .btn-onyx:hover {
            background: var(--onyx-gold);
            color: #000;
            box-shadow: 0 0 30px rgba(197, 160, 89, 0.3);
        }

        /* Vetting Terminal UI */
        #vetting-terminal {
            display: none;
            text-align: left;
            background: rgba(255,255,255,0.02);
            padding: 30px;
            border-radius: 4px;
            font-family: monospace;
            border-left: 2px solid var(--onyx-gold);
        }

        .terminal-row {
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.5s ease;
        }

        .terminal-row.active { opacity: 1; transform: translateX(0); }
        .terminal-row.success { color: var(--onyx-gold); }

        .dot { height: 3px; width: 3px; background: var(--onyx-gold); border-radius: 50%; margin-right: 15px; }

        .encryption-footer {
            position: fixed;
            bottom: 40px;
            font-size: 0.5rem;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.2);
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div style="color: var(--onyx-gold); font-size: 0.6rem; letter-spacing: 4px; margin-bottom: 15px;">PRIVÉ</div>
            <h1>ONYX</h1>
            <div class="subtitle">Digital Sovereignty Archive</div>
        </header>

        <div id="form-container">
            <form id="onyx-onboarding">
                <div class="input-group">
                    <label>Designation</label>
                    <input type="text" id="user-name" placeholder="ENTER LEGAL IDENTITY" required autocomplete="off">
                </div>

                <div class="input-group">
                    <label>Node Location</label>
                    <input type="text" id="user-city" placeholder="CURRENT METROPOLIS" required autocomplete="off">
                </div>

                <div class="input-group">
                    <label>Clearance Level</label>
                    <select id="user-intent" required>
                        <option value="" disabled selected>SELECT ACCESS TIER</option>
                        <option value="obsidian">Obsidian Networking</option>
                        <option value="ivory">Ivory Luxury Concierge</option>
                        <option value="gold">Gold Curated Circle</option>
                    </select>
                </div>

                <button type="submit" class="btn-onyx">Initialize Security Protocol</button>
            </form>
        </div>

        <div id="vetting-terminal">
            <div class="terminal-row" id="t1"><div class="dot"></div> Bypassing Standard Firewalls...</div>
            <div class="terminal-row" id="t2"><div class="dot"></div> Validating Geographic Coordinates...</div>
            <div class="terminal-row" id="t3"><div class="dot"></div> Synchronizing Biometric Profiles...</div>
            <div class="terminal-row" id="t4"><div class="dot"></div> Compiling Private Archive Access...</div>
            <div class="terminal-row" id="t5"><div class="dot"></div> ACCESS GRANTED. WELCOME TO ONYX.</div>
        </div>
    </div>

    <div class="encryption-footer">256-BIT QUANTUM ENCRYPTION ACTIVE</div>

    <script>
        document.getElementById('onyx-onboarding').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Local Storage Persistence
            const name = document.getElementById('user-name').value;
            localStorage.setItem('onyx_member', name);
            
            // Interface Transition
            document.getElementById('form-container').style.display = 'none';
            document.getElementById('vetting-terminal').style.display = 'block';

            const sequence = [
                { id: 't1', wait: 600 },
                { id: 't2', wait: 1400 },
                { id: 't3', wait: 2400 },
                { id: 't4', wait: 3400 },
                { id: 't5', wait: 4400 }
            ];

            sequence.forEach(step => {
                setTimeout(() => {
                    const el = document.getElementById(step.id);
                    el.classList.add('active');
                    if(step.id === 't5') el.classList.add('success');
                }, step.wait);
            });

            // Final Redirection to the Gallery Page
            setTimeout(() => {
                window.location.href = 'explore.html';
            }, 6000);
        });
    </script>
</body>
                        </html>
